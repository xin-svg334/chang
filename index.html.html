<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>地縛靈的立法院 · 跟著陳定南反貪腐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1B212C;
    --bg-deep: #12161D;
    --panel: #262E3D;
    --parchment: #F2EAD9;
    --parchment-dim: #E3D9C2;
    --gold: #D4A83B;
    --red: #C23B3B;
    --ink: #241F1A;
    --good-suit: #3B4A63;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; height:100%; overflow:hidden;
    background:var(--bg-deep);
    color:var(--parchment);
    font-family:'Noto Sans TC', sans-serif;
  }
  .pixel-font{ font-family:'Noto Sans TC', sans-serif; }
  svg.pixel-person, svg.pixel-decoy{ shape-rendering:crispEdges; display:block; }

  .screen{ position:fixed; inset:0; display:none; flex-direction:column; }
  .screen.visible{ display:flex; }

  /* ================= STORY SCREEN ================= */
  #storyScreen, #winTransitionScreen{
    background:
      radial-gradient(ellipse at 50% 0%, #2A3244 0%, var(--bg) 55%, var(--bg-deep) 100%);
    justify-content:center; align-items:center; padding:24px;
    cursor:pointer;
  }
  .story-card{
    width:100%; max-width:420px; display:flex; flex-direction:column; align-items:center;
  }
  #storySprite{ min-height:120px; display:flex; align-items:flex-end; justify-content:center; margin-bottom:18px; }
  #storySprite svg, #winTransSprite svg{ width:96px; height:auto; filter:drop-shadow(0 6px 10px rgba(0,0,0,0.5)); }
  #storySprite .duo{ display:flex; gap:18px; align-items:flex-end; }
  #storySprite .duo svg.pixel-decoy{ width:56px; opacity:0.85; }
  .duo-item{ position:relative; display:flex; flex-direction:column; align-items:center; cursor:pointer; }
  .duo-tag{
    position:absolute; top:-24px; left:50%; transform:translateX(-50%);
    font-size:11px; letter-spacing:1px; color:var(--gold); white-space:nowrap;
    animation:blinkSlow 1.2s ease-in-out infinite;
  }
  .bounce{ animation: bounceUpDown 0.55s ease-in-out infinite; }
  @keyframes bounceUpDown{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-9px); } }

  .dialogue-box{
    background:var(--parchment); color:var(--ink);
    border:1px solid rgba(36,31,26,0.25);
    border-radius:4px; padding:22px 20px; width:100%;
    font-size:15.5px; line-height:1.9; min-height:76px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
    position:relative;
  }
  .dialogue-box::before{
    content:''; position:absolute; top:-8px; left:28px; width:14px; height:14px;
    background:var(--parchment); transform:rotate(45deg);
    border-left:1px solid rgba(36,31,26,0.25); border-top:1px solid rgba(36,31,26,0.25);
  }
  .story-prompt{
    margin-top:20px; font-size:12px; letter-spacing:2px; color:var(--gold);
    animation:blinkSlow 1.8s ease-in-out infinite;
  }
  @keyframes blinkSlow{0%,100%{opacity:0.25} 50%{opacity:1}}

  /* ================= GAME SCREEN ================= */
  #gameScreen{ background:var(--bg-deep); }
  #gameScreen.shaking{ animation:shakeAnim 0.4s infinite; }
  @keyframes shakeAnim{
    0%{transform:translate(0,0)} 25%{transform:translate(-5px,3px)}
    50%{transform:translate(5px,-3px)} 75%{transform:translate(-3px,-5px)} 100%{transform:translate(0,0)}
  }
  .game-hud{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px 8px; flex-shrink:0;
  }
  .hearts{ display:flex; gap:6px; font-size:22px; color:var(--red); }
  .hearts .heart.empty{ color:#3A3F49; }
  .timer-box{
    font-size:13px; letter-spacing:1px; color:var(--gold); background:var(--panel);
    padding:8px 12px; border-radius:3px; border:1px solid rgba(212,168,59,0.3);
  }
  .game-title{
    text-align:center; font-size:11px; letter-spacing:2px; color:var(--parchment-dim);
    margin-top:4px; flex-shrink:0;
  }
  #arenaWrap{ flex:1; position:relative; display:flex; align-items:flex-end; justify-content:center; padding:0 10px 18px; }
  #arena{
    position:relative; width:100%; max-width:420px; height:min(52vh, 300px);
  }
  .seat-dot{
    position:absolute; width:6px; height:6px; border-radius:1px;
    background:rgba(255,255,255,0.08); transform:translate(-50%,50%);
  }
  .podium{
    position:absolute; left:50%; bottom:2px; transform:translate(-50%,0);
    width:28px; height:14px; background:#3A2F22; border:1px solid var(--gold); border-radius:2px 2px 0 0;
  }
  .unit{
    position:absolute; width:30px; transform:translate(-50%,50%);
    cursor:pointer; animation:popIn 0.25s ease; z-index:5; transition:filter .15s;
  }
  .unit-decoy{ width:20px; opacity:0.9; }
  .unit:active{ filter:brightness(1.3); }
  @keyframes popIn{ 0%{transform:translate(-50%,50%) scale(0.2); opacity:0;} 100%{transform:translate(-50%,50%) scale(1); opacity:1;} }

  #arena.frozen .unit{ pointer-events:none; filter:grayscale(0.6) brightness(0.7); }
  #arena.frozen::after{
    content:'延遲反應中…'; position:absolute; top:8px; left:50%; transform:translateX(-50%);
    font-size:11px; color:var(--red); letter-spacing:1px;
  }

  .float-text{
    position:absolute; transform:translate(-50%,0); font-size:11px; color:var(--parchment);
    background:rgba(18,20,26,0.9); padding:3px 7px; border-radius:3px; white-space:nowrap;
    animation:floatUp 1.1s ease forwards; pointer-events:none; z-index:20; border:1px solid rgba(212,168,59,0.3);
  }
  @keyframes floatUp{ 0%{opacity:0; transform:translate(-50%,0);} 15%{opacity:1;} 100%{opacity:0; transform:translate(-50%,-26px);} }

  #warningBanner{
    position:fixed; top:70px; left:50%; transform:translate(-50%,-8px);
    background:rgba(194,59,59,0.92); color:#fff; padding:10px 18px; border-radius:3px;
    font-size:13px; letter-spacing:1px; opacity:0; transition:opacity .25s, transform .25s; z-index:50;
    text-align:center; max-width:80vw;
  }
  #warningBanner.show{ opacity:1; transform:translate(-50%,0); }

  #chenQuoteOverlay{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    pointer-events:none; opacity:0; transform:scale(0.92); transition:opacity .3s ease, transform .3s ease; z-index:30;
    padding:20px;
  }
  #chenQuoteOverlay.show{ opacity:1; transform:scale(1); }
  #chenQuoteSprite svg{ width:70px; filter:drop-shadow(0 6px 12px rgba(0,0,0,0.5)); margin-bottom:10px; }
  #chenQuoteText{
    background:var(--parchment); color:var(--ink); font-size:13.5px; line-height:1.8;
    padding:14px 16px; border-radius:4px; max-width:280px; text-align:center;
    box-shadow:0 10px 24px rgba(0,0,0,0.4); border:1px solid rgba(36,31,26,0.2);
  }

  /* ================= ENDING SCREEN ================= */
  #endingScreen{
    justify-content:center; align-items:center; text-align:center; padding:32px;
  }
  #endingScreen.ending-lose{ background:#0A0B0E; }
  #endingScreen.ending-win{ background:linear-gradient(180deg,#1B212C,#262E3D); }
  #endingScreen.ending-partial{ background:#1B212C; }
  #endingSprite svg{ width:100px; margin-bottom:18px; filter:drop-shadow(0 8px 14px rgba(0,0,0,0.5)); }
  .chen-bow{ display:inline-block; transform:rotate(18deg); transform-origin:50% 85%; }
  .ending-eyebrow{ font-size:11px; letter-spacing:3px; color:var(--gold); margin-bottom:14px; }
  .ending-text{ max-width:380px; font-size:16px; line-height:1.9; color:var(--parchment); margin-bottom:30px; }
  .ending-lose .ending-text{ color:#8A8F99; }
  .replay-btn{
    padding:13px 30px; border:1px solid var(--gold); background:transparent; color:var(--gold);
    border-radius:3px; font-size:14px; letter-spacing:1px; cursor:pointer; font-family:'Noto Sans TC',sans-serif;
  }
</style>
</head>
<body>

<!-- ============ STORY SCREEN ============ -->
<div id="storyScreen" class="screen visible">
  <div class="story-card">
    <div id="storySprite"></div>
    <div class="dialogue-box">
      <div id="storyText"></div>
    </div>
    <div class="story-prompt pixel-font" id="storyPrompt"></div>
  </div>
</div>

<!-- ============ GAME SCREEN ============ -->
<div id="gameScreen" class="screen">
  <div class="game-hud">
    <div class="hearts"><span class="heart" id="h0">♥</span><span class="heart" id="h1">♥</span><span class="heart" id="h2">♥</span></div>
    <div class="timer-box pixel-font" id="timerText">40s</div>
  </div>
  <div class="game-title">立法院議場 · 清除偽裝的貪腐勢力</div>
  <div id="arenaWrap">
    <div id="arena">
      <div class="podium"></div>
    </div>
    <div id="chenQuoteOverlay">
      <div id="chenQuoteSprite"></div>
      <div id="chenQuoteText"></div>
    </div>
  </div>
</div>
<div id="warningBanner"></div>

<!-- ============ WIN TRANSITION SCREEN ============ -->
<div id="winTransitionScreen" class="screen">
  <div class="story-card">
    <div id="winTransSprite"></div>
    <div class="dialogue-box"><div id="winTransText"></div></div>
    <div class="story-prompt pixel-font" id="winTransPrompt"></div>
  </div>
</div>

<!-- ============ ENDING SCREEN ============ -->
<div id="endingScreen" class="screen">
  <div class="ending-eyebrow" id="endingEyebrow">結局</div>
  <div id="endingSprite"></div>
  <div class="ending-text" id="endingText"></div>
  <button class="replay-btn" id="backToStartBtn">回到開頭</button>
</div>

<script>
/* ============================================================
   PIXEL SPRITE BUILDERS
============================================================ */
function buildPerson({suit='#3B4A63', tie='#8A2E2E', skin='#E8B98A', hair='#241F1A', glasses=false, evil=false}={}){
  const eyes = evil
    ? `<rect x="5" y="8" width="2" height="2" fill="#C23B3B"/><rect x="9" y="8" width="2" height="2" fill="#C23B3B"/>
       <rect x="4" y="6" width="3" height="1" fill="#241F1A" transform="rotate(18 5 6)"/>
       <rect x="9" y="6" width="3" height="1" fill="#241F1A" transform="rotate(-18 11 6)"/>`
    : `<rect x="5" y="8" width="2" height="2" fill="#241F1A"/><rect x="9" y="8" width="2" height="2" fill="#241F1A"/>`;
  const mouth = evil
    ? `<rect x="5" y="11" width="6" height="1.4" fill="#7A1F1F"/>`
    : `<rect x="6" y="11" width="4" height="1" fill="#8A6A4A"/>`;
  const glassesMarkup = glasses
    ? `<rect x="3.6" y="7" width="4" height="3" fill="none" stroke="#241F1A" stroke-width="0.7"/>
       <rect x="8.4" y="7" width="4" height="3" fill="none" stroke="#241F1A" stroke-width="0.7"/>
       <rect x="7.6" y="8.2" width="0.8" height="0.6" fill="#241F1A"/>`
    : '';
  return `
  <svg viewBox="0 0 16 26" class="pixel-person">
    <rect x="4" y="4" width="8" height="8" fill="${skin}"/>
    <rect x="4" y="3" width="8" height="2" fill="${hair}"/>
    ${eyes}
    ${mouth}
    ${glassesMarkup}
    <rect x="2" y="12" width="12" height="9" fill="${suit}"/>
    <rect x="7" y="12" width="2" height="7" fill="${tie}"/>
    <rect x="0" y="13" width="2" height="7" fill="${suit}"/>
    <rect x="14" y="13" width="2" height="7" fill="${suit}"/>
    <rect x="4" y="21" width="3" height="4" fill="#2A2A2E"/>
    <rect x="9" y="21" width="3" height="4" fill="#2A2A2E"/>
    <rect x="4" y="25" width="3" height="1" fill="#111"/>
    <rect x="9" y="25" width="3" height="1" fill="#111"/>
  </svg>`;
}
function buildDecoy(){
  return `
  <svg viewBox="0 0 16 16" class="pixel-decoy">
    <rect x="5" y="2" width="6" height="6" fill="#8A8F99"/>
    <rect x="3" y="9" width="10" height="7" fill="#6B7280"/>
    <rect x="6" y="9" width="2" height="5" fill="#565C66"/>
  </svg>`;
}
function buildChen({bow=false}={}){
  const svg = buildPerson({suit:'#2E3A4E', tie:'#2F6F5E', glasses:false, evil:false});
  return bow ? `<div class="chen-bow">${svg}</div>` : svg;
}
function chainIcon(){
  return `<svg viewBox="0 0 16 16" style="width:64px"><circle cx="5" cy="6" r="3" fill="none" stroke="#D4A83B" stroke-width="1.4"/><circle cx="10" cy="10" r="3" fill="none" stroke="#D4A83B" stroke-width="1.4"/></svg>`;
}
function ghostIcon(){
  return `<svg viewBox="0 0 16 16" style="width:64px"><path d="M3 14V7a5 5 0 0 1 10 0v7l-2-2-1.5 2-1.5-2-1.5 2-1.5-2z" fill="#EAE3D2" opacity="0.85"/><rect x="6" y="6" width="1.4" height="1.4" fill="#241F1A"/><rect x="9" y="6" width="1.4" height="1.4" fill="#241F1A"/></svg>`;
}

/* ============================================================
   STORY (click-through narrative)
============================================================ */
const scenes = [
  { type:'chen', text:'這是陳定南。', prompt:'請繼續點擊' },
  { type:null, text:'1990 年陳定南開始連任四屆立法委員,涉及反貪腐與黑金政商、環境與核能、憲政改革、司法與法治、人權與轉型正義等議題……', prompt:'請繼續點擊' },
  { type:'ghost', text:'你從 20XX 年不小心跌落到了 1990 年的立法院,變成立法院地縛靈,你需要得到自由……對吧?', prompt:'請繼續點擊' },
  { type:'worker', text:'你看到了一位不搶鏡的像素小人努力工作……', prompt:'請繼續點擊' },
  { type:'chen', text:'他的問政方式以院會發言、法律提案與連署、專案及緊急質詢為主,你看到了……陳定南,好吧,你決定跟著他尋找離開立法院的方法。', prompt:'請繼續點擊' },
  { type:'villainDuo', text:'這是貪腐勢力與替身使者,持續散發貪腐力量侵蝕立法院,或許會受到懲罰……誰知道呢。', prompt:'請繼續點擊' },
  { type:'villain', text:'國民黨屏東縣長治鄉鄉黨部常委等六人,為伍澤元買票,每票不過數百元', prompt:'請繼續點擊' },
  { type:'villain', text:'結果伍澤元照樣攬任他的縣長', prompt:'請繼續點擊' },
  { type:'decoy', text:'替他買票的小卒,卻被檢察官求刑七年,最後法院判刑四年。', prompt:'請繼續點擊' },
  { type:'villain', requiresReveal:true, revealPrompt:'請點擊查看', text:'國民黨屏東縣議長提名人鄭太吉,開出四十六連號的支票,其中一張面額二百萬元,二張面額一百萬元,其餘四十三張均為五十萬元', prompt:'請繼續點擊' },
  { type:'villain', text:'結果如此嚴重的賄選案,檢察官只起訴四十三人,求刑四年。', prompt:'請繼續點擊' },
  { type:'villain', text:'此外,鄭太吉是大家公認的黑道份子,當時許多人均反映不可提名黑道份子競選議長', prompt:'請繼續點擊' },
  { type:'villain', text:'但是國民黨縣黨部卻對外表示,鄭太吉極於屏東縣長選舉中,身先士卒,為國民黨立下許多汗馬功勞', prompt:'請繼續點擊' },
  { type:'villain', text:'論功行賞,功在黨國,故應提名他;同時,國民黨要執政,亦應重視黑道力量。', prompt:'請繼續點擊' },
  { type:'villain', text:'此一說法實在可笑。', prompt:'請繼續點擊' },
  { type:'chain', text:'你好像隱隱感覺到禁錮的力量越來越強大,再擴張下去,你將永遠成為立法院地縛靈。', prompt:'請繼續點擊' },
  { type:'chen', text:'你決定跟隨陳定南一起反貪腐與黑金政商。', prompt:'請繼續點擊' },
  { type:'chen', text:'用質詢揭破黑暗吧!小提示:變臉才可點擊', prompt:'開始質詢' },
];

let sceneIndex = 0;
let revealed = false;

const storyScreen = document.getElementById('storyScreen');
const storySprite = document.getElementById('storySprite');
const storyText = document.getElementById('storyText');
const storyPrompt = document.getElementById('storyPrompt');

function spriteMarkupFor(type){
  switch(type){
    case 'chen': return buildChen();
    case 'worker': return buildPerson({suit:'#4B5A73', tie:'#4F8F5C', glasses:false});
    case 'villain': return buildPerson({suit:'#3B4A63', tie:'#5A6472', glasses:true});
    case 'villainDuo': return `<div class="duo">
      <div class="duo-item" id="duoVillain"><span class="duo-tag" id="duoVillainTag">請點擊</span>${buildPerson({suit:'#3B4A63', tie:'#5A6472', glasses:true})}</div>
      <div class="duo-item" id="duoDecoy"><span class="duo-tag" id="duoDecoyTag" style="display:none">請點擊</span>${buildDecoy()}</div>
    </div>`;
    case 'decoy': return buildDecoy();
    case 'ghost': return ghostIcon();
    case 'chain': return chainIcon();
    default: return '';
  }
}

let duoStep = 0; // 0: villain needs tap, 1: decoy needs tap, 2: done

function renderScene(){
  const sc = scenes[sceneIndex];
  storySprite.innerHTML = spriteMarkupFor(sc.type);
  if(sc.type === 'villainDuo'){
    duoStep = 0;
    const villainWrap = document.getElementById('duoVillain');
    const decoyWrap = document.getElementById('duoDecoy');
    const villainSvg = villainWrap.querySelector('svg');
    const decoySvg = decoyWrap.querySelector('svg');
    const villainTag = document.getElementById('duoVillainTag');
    const decoyTag = document.getElementById('duoDecoyTag');
    villainSvg.classList.add('bounce');
    villainWrap.addEventListener('click', (e)=>{
      e.stopPropagation();
      if(duoStep !== 0) return;
      villainSvg.classList.remove('bounce');
      villainTag.style.display = 'none';
      decoySvg.classList.add('bounce');
      decoyTag.style.display = 'block';
      duoStep = 1;
    });
    decoyWrap.addEventListener('click', (e)=>{
      e.stopPropagation();
      if(duoStep !== 1) return;
      decoySvg.classList.remove('bounce');
      decoyTag.style.display = 'none';
      duoStep = 2;
    });
  }
  if(sc.requiresReveal && !revealed){
    storyText.style.visibility = 'hidden';
    storyPrompt.textContent = sc.revealPrompt || '請點擊查看';
  } else {
    storyText.style.visibility = 'visible';
    storyText.textContent = sc.text;
    storyPrompt.textContent = sc.prompt || '請繼續點擊';
  }
}

storyScreen.addEventListener('click', ()=>{
  const sc = scenes[sceneIndex];
  if(sc.type === 'villainDuo' && duoStep < 2) return;
  if(sc.requiresReveal && !revealed){
    revealed = true;
    renderScene();
    return;
  }
  if(sceneIndex === scenes.length - 1){
    beginGame();
    return;
  }
  sceneIndex++;
  revealed = false;
  renderScene();
});

renderScene();

/* ============================================================
   GAME
============================================================ */
const gameScreen = document.getElementById('gameScreen');
const endingScreen = document.getElementById('endingScreen');
const arena = document.getElementById('arena');
const timerText = document.getElementById('timerText');
const warningBanner = document.getElementById('warningBanner');
const hearts = [document.getElementById('h0'), document.getElementById('h1'), document.getElementById('h2')];

const PIVOT_BOTTOM = 8;
let seats = [];
function initSeats(){
  seats = [];
  let id = 0;
  const rows = 4;
  for(let r=0;r<rows;r++){
    const count = 7 + r*2;
    const radius = 30 + r*28;
    for(let i=0;i<count;i++){
      const t = count===1 ? 0.5 : i/(count-1);
      const angle = Math.PI*(0.08 + 0.84*t);
      const x = Math.cos(angle)*radius;
      const y = Math.sin(angle)*radius;
      seats.push({id:id++, x, y, occupied:false});
    }
  }
}
function renderSeatDots(){
  arena.querySelectorAll('.seat-dot').forEach(el=>el.remove());
  seats.forEach(s=>{
    const d = document.createElement('div');
    d.className = 'seat-dot';
    d.style.left = `calc(50% + ${s.x}px)`;
    d.style.bottom = `${s.y + PIVOT_BOTTOM}px`;
    arena.appendChild(d);
  });
}
initSeats();
renderSeatDots();

let lives, timeLeft, decoySpawned, decoyClicked, villainCount, doubleSpawnActive, spawningStopped, frozen;
let activeUnits = {};
let gameTimerId=null, spawnTimerId=null, corruptTimerId=null;

function resetGameState(){
  lives = 3; timeLeft = 40; decoySpawned = 0; decoyClicked = 0; villainCount = 0;
  doubleSpawnActive = false; spawningStopped = false; frozen = false;
  Object.values(activeUnits).forEach(u=>{ clearTimeout(u.expireTimer); clearTimeout(u.flashTimer); if(u.el) u.el.remove(); });
  activeUnits = {};
  seats.forEach(s=> s.occupied = false);
  arena.querySelectorAll('.unit, .float-text').forEach(el=>el.remove());
  arena.classList.remove('frozen');
  updateHearts();
  timerText.textContent = timeLeft + 's';
}

function updateHearts(){
  hearts.forEach((h,i)=> h.classList.toggle('empty', i >= lives));
}

function beginGame(){
  storyScreen.classList.remove('visible');
  resetGameState();
  gameScreen.classList.add('visible');
  gameTimerId = setInterval(tick, 1000);
  spawnTimerId = setInterval(spawnTick, 1100);
  corruptTimerId = setInterval(tryCorrupt, 5000);
  spawnTick();
}

function tick(){
  timeLeft--;
  timerText.textContent = Math.max(timeLeft,0) + 's';
  const elapsed = 40 - timeLeft;
  if(elapsed >= 21) doubleSpawnActive = true;
  if(timeLeft <= 5) spawningStopped = true;
  if(timeLeft <= 0){
    clearInterval(gameTimerId); clearInterval(spawnTimerId); clearInterval(corruptTimerId);
    triggerEnding(villainCount > 0 ? 'partial' : 'win');
  }
}

function randomChoice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function spawnTick(){
  if(spawningStopped) return;
  const count = doubleSpawnActive ? 2 : 1;
  for(let i=0;i<count;i++) decideAndSpawnOne();
}

function decideAndSpawnOne(){
  const empty = seats.filter(s=>!s.occupied);
  if(empty.length===0) return;
  const seat = randomChoice(empty);
  const elapsed = 40 - timeLeft;
  const canDecoy = elapsed < 20 && decoySpawned < 10;
  const r = Math.random();
  if(canDecoy && r < 0.15) spawnDecoy(seat);
  else if(r < 0.6) spawnVillain(seat);
  else spawnGood(seat);
}

function positionEl(el, seat){
  el.style.left = `calc(50% + ${seat.x}px)`;
  el.style.bottom = `${seat.y + PIVOT_BOTTOM}px`;
}

function spawnGood(seat){
  const glasses = true;
  const el = document.createElement('div');
  el.className = 'unit unit-good';
  el.innerHTML = buildPerson({suit:'#3B4A63', tie: randomTie(), glasses, evil:false});
  positionEl(el, seat);
  arena.appendChild(el);
  seat.occupied = true;
  const unit = {type:'good', el, seat};
  el.onclick = ()=> onClickUnit(unit);
  unit.expireTimer = setTimeout(()=> removeUnit(unit), 4500);
  activeUnits[seat.id] = unit;
}
function randomTie(){
  return randomChoice(['#8A6A2E','#5A6472','#6E4B3A','#4F6B57']);
}

function spawnVillain(seat){
  const glasses = true;
  const el = document.createElement('div');
  el.className = 'unit unit-villain';
  el.innerHTML = buildPerson({suit:'#3B4A63', tie:'#5A6472', glasses, evil:false});
  positionEl(el, seat);
  arena.appendChild(el);
  seat.occupied = true;
  villainCount++;
  const unit = {type:'villainDisguised', el, seat, isEvil:false, glasses};
  el.onclick = ()=> onClickUnit(unit);
  activeUnits[seat.id] = unit;
  scheduleFlash(unit);
}

function scheduleFlash(unit){
  const calmDuration = 1400 + Math.random()*1800;
  unit.flashTimer = setTimeout(()=>{
    if(!activeUnits[unit.seat.id]) return;
    unit.isEvil = true;
    unit.el.innerHTML = buildPerson({suit:'#3B4A63', tie:'#C23B3B', glasses:unit.glasses, evil:true});
    setTimeout(()=>{
      if(!activeUnits[unit.seat.id]) return;
      unit.isEvil = false;
      unit.el.innerHTML = buildPerson({suit:'#3B4A63', tie:'#5A6472', glasses:unit.glasses, evil:false});
      scheduleFlash(unit);
    }, 2050);
  }, calmDuration);
}

function spawnDecoy(seat){
  decoySpawned++;
  const el = document.createElement('div');
  el.className = 'unit unit-decoy';
  el.innerHTML = buildDecoy();
  positionEl(el, seat);
  arena.appendChild(el);
  seat.occupied = true;
  const unit = {type:'decoy', el, seat};
  el.onclick = ()=> onClickUnit(unit);
  unit.expireTimer = setTimeout(()=> removeUnit(unit), 3200);
  activeUnits[seat.id] = unit;
}

function tryCorrupt(){
  if(spawningStopped) return;
  if(Math.random() > 0.55) return;
  const goodUnits = Object.values(activeUnits).filter(u=>u.type==='good');
  if(goodUnits.length===0) return;
  const u = randomChoice(goodUnits);
  clearTimeout(u.expireTimer);
  u.type = 'villainCorrupted';
  const glasses = true;
  u.el.innerHTML = buildPerson({suit:'#5C2A3B', tie:'#C23B3B', glasses, evil:true});
  showFloatText(u.el, '遭到汙染!');
  villainCount++;
}

const chenQuotes = [
  '政府口口聲聲要辦貪污,本席相信最後大概仍只是抓幾個小卒交差了事。'
];
const chenQuoteOverlay = document.getElementById('chenQuoteOverlay');
const chenQuoteSprite = document.getElementById('chenQuoteSprite');
const chenQuoteText = document.getElementById('chenQuoteText');
let chenQuoteShowing = false;

function maybeShowChenQuote(){
  if(chenQuoteShowing) return;
  if(Math.random() > 0.25) return;
  chenQuoteShowing = true;
  chenQuoteSprite.innerHTML = buildChen();
  chenQuoteText.textContent = randomChoice(chenQuotes);
  chenQuoteOverlay.classList.add('show');
  setTimeout(()=>{
    chenQuoteOverlay.classList.remove('show');
    chenQuoteShowing = false;
  }, 2400);
}

function onClickUnit(unit){
  if(frozen) return;
  if(!activeUnits[unit.seat.id]) return;

  if(unit.type === 'good'){
    lives--;
    updateHearts();
    showFloatText(unit.el, '看錯人了……');
    triggerShake();
    removeUnit(unit);
    if(lives <= 0){
      clearInterval(gameTimerId); clearInterval(spawnTimerId); clearInterval(corruptTimerId);
      setTimeout(()=> endGame('lose'), 900);
    }
  } else if(unit.type === 'villainDisguised'){
    if(unit.isEvil){
      villainCount--;
      showFloatText(unit.el, '擊中!');
      removeUnit(unit);
      maybeShowChenQuote();
      maybeWinCheck();
    } else {
      showFloatText(unit.el, '他看起來很正常……');
    }
  } else if(unit.type === 'villainCorrupted'){
    villainCount--;
    showFloatText(unit.el, '擊中!');
    removeUnit(unit);
    maybeShowChenQuote();
    maybeWinCheck();
  } else if(unit.type === 'decoy'){
    decoyClicked++;
    const msg = (decoyClicked >= 10 && decoySpawned >= 10) ? '傷害不了我' : '樁腳承擔傷害';
    showFloatText(unit.el, msg);
    removeUnit(unit);
    freezeArena(1300);
  }
}

function removeUnit(unit){
  clearTimeout(unit.expireTimer);
  clearTimeout(unit.flashTimer);
  if(unit.el && unit.el.parentNode) unit.el.remove();
  unit.seat.occupied = false;
  delete activeUnits[unit.seat.id];
}

function maybeWinCheck(){
  if(spawningStopped && villainCount <= 0){
    clearInterval(gameTimerId); clearInterval(spawnTimerId); clearInterval(corruptTimerId);
    triggerEnding('win');
  }
}

function freezeArena(ms){
  frozen = true;
  arena.classList.add('frozen');
  setTimeout(()=>{ frozen = false; arena.classList.remove('frozen'); }, ms);
}

function triggerShake(){
  gameScreen.classList.add('shaking');
  warningBanner.textContent = '神秘力量即將攻佔立法院';
  warningBanner.classList.add('show');
  setTimeout(()=>{
    gameScreen.classList.remove('shaking');
    warningBanner.classList.remove('show');
  }, 3000);
}

function showFloatText(unitEl, msg){
  const rect = unitEl.getBoundingClientRect();
  const arenaRect = arena.getBoundingClientRect();
  const span = document.createElement('div');
  span.className = 'float-text';
  span.textContent = msg;
  span.style.left = (rect.left - arenaRect.left + rect.width/2) + 'px';
  span.style.top = (rect.top - arenaRect.top) + 'px';
  arena.appendChild(span);
  setTimeout(()=> span.remove(), 1100);
}

/* ============================================================
   ENDINGS
============================================================ */
const endingSprite = document.getElementById('endingSprite');
const endingText = document.getElementById('endingText');
const endingEyebrow = document.getElementById('endingEyebrow');

const winTransitionScreen = document.getElementById('winTransitionScreen');
const winTransSprite = document.getElementById('winTransSprite');
const winTransText = document.getElementById('winTransText');
const winTransPrompt = document.getElementById('winTransPrompt');

function triggerEnding(result){
  if(result === 'win'){
    showWinTransition();
  } else {
    endGame(result);
  }
}

function showWinTransition(){
  gameScreen.classList.remove('visible');
  gameScreen.classList.remove('shaking');
  winTransSprite.innerHTML = ghostIcon();
  winTransText.textContent = '身體禁錮消失了......';
  winTransPrompt.textContent = '打擊黑金夥伴有話要跟你說QAQ';
  winTransitionScreen.classList.add('visible');
}

winTransitionScreen.addEventListener('click', ()=>{
  winTransitionScreen.classList.remove('visible');
  endGame('win');
});

function endGame(result){
  gameScreen.classList.remove('visible');
  gameScreen.classList.remove('shaking');
  endingScreen.classList.add('visible');
  endingScreen.className = 'screen visible ending-' + result;

  if(result === 'lose'){
    endingEyebrow.textContent = '淪陷';
    endingSprite.innerHTML = '';
    endingText.textContent = '你將永遠成為立法院地縛靈,淪陷在失落的世界。';
  } else if(result === 'win'){
    endingEyebrow.textContent = '過關';
    endingSprite.innerHTML = buildChen({bow:true});
    endingText.textContent = '我要離開立法院,就任法務部長了,有興趣再跟著我一起冒險吧!';
  } else {
    endingEyebrow.textContent = '未完全清除';
    endingSprite.innerHTML = '';
    endingText.textContent = '還沒完全成功呢,不過世界就是這樣吧……再挑戰一次?';
  }
}

document.getElementById('backToStartBtn').addEventListener('click', ()=>{
  endingScreen.classList.remove('visible');
  sceneIndex = 0;
  revealed = false;
  storyScreen.classList.add('visible');
  renderScene();
});
</script>
